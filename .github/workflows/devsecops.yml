name: DevSecOps CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-secure:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull code from repo
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Security 1: Gitleaks (Secret Scanning)
      - name: Run Gitleaks (Secret Scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Security 2: Semgrep (SAST - Static Application Security Testing)
      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/javascript p/react p/security-audit"

      # Setup Node.js
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Install Dependencies
      - name: Install dependencies
        run: npm install

      # Security 3: Dependency Scanning (SCA)
      - name: Run npm audit (Dependency Security)
        run: npm audit --audit-level=high || true

      # Build Docker Image for Container Scanning
      - name: Build Docker Image
        run: docker build -t gslc-frontend:latest .

      # Security 4: Container Scanning using Trivy
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'gslc-frontend:latest'
          format: 'table'
          exit-code: '0' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Security 5: DAST - OWASP ZAP Scan
      - name: Start App for DAST
        run: |
          # Start container in the background
          docker run -d --name zap-target -p 3000:3000 gslc-frontend:latest
          sleep 10

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          token: ${{ secrets.GITHUB_TOKEN }}
          issue_title: 'Security 5: DAST Scan Results'
          fail_action: false

      - name: Stop and Cleanup App
        if: always()
        run: docker stop zap-target && docker rm zap-target
