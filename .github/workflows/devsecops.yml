name: DevSecOps CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-secure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # 1. Pull code from repo
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Security 1: Gitleaks (Secret Scanning)
      - name: Run Gitleaks (Secret Scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Security 2: Semgrep (SAST - Static Application Security Testing)
      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/javascript p/react p/security-audit"

      # Setup Node.js
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Install Dependencies
      - name: Install dependencies
        run: npm install

      # Security 3: Dependency Scanning (SCA)
      - name: Run npm audit (Dependency Security)
        run: npm audit --audit-level=high

      # Build Docker Image for Container Scanning
      - name: Build Docker Image
        run: docker build -t gslc-frontend:latest .

      # Security 4: Container Scanning using Trivy
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'gslc-frontend:latest'
          format: 'table'
          exit-code: '1' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
      
      # Install Cosign tool
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      # Security 5: Sign the Docker Image
      - name: Sign the published Docker image
        run: |
          # Capturing the local image ID to sign the specific build
          IMAGE_ID=$(docker images -q gslc-frontend:latest)
          cosign sign --yes --allow-import-unsafe-local-graph gslc-frontend@${IMAGE_ID}