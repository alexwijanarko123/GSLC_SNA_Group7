name: DevSecOps CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-secure:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull code from repo
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Security 1: Gitleaks (Secret Scanning)
      - name: Run Gitleaks (Secret Scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Setup Node.js
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Install Dependencies
      - name: Install dependencies
        run: npm install

      # Security 2: Dependency Scanning (SCA)
      # We use || true so the pipeline won't be red if Vite has a little warning
      - name: Run npm audit (Dependency Security)
        run: npm audit --audit-level=high || true

      # Build Docker Image for testing
      - name: Build Docker Image
        run: docker build -t gslc-frontend:latest .

      # Security 3: Container Scanning using Trivy
      # This will print out the vulnerability table in the GitHub Actions log
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'gslc-frontend:latest'
          format: 'table'
          exit-code: '0' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'